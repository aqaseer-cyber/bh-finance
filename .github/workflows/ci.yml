name: tests
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  pytest:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - run: pip install -r requirements.txt
      - run: pip install -e ".[test]"
      # sandbox-parity JS engine: quickjs preferred, best-effort (no wheel
      # on every platform); dukpy is the fallback the test knows how to use
      - run: pip install quickjs || pip install dukpy
        shell: bash
      - run: python -m pytest tests/ -q
